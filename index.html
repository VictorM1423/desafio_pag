<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Factorización LU</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
        input[type="number"] { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #matrix-input { display: grid; gap: 10px; margin: 20px 0; justify-content: center; }
        .results { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .matrix-display { background: #fafafa; padding: 15px; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { margin: auto; border-collapse: collapse; }
        td { padding: 5px; border: 1px solid #ccc; min-width: 40px; text-align: center; }
        .error { color: #e74c3c; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Factorización LU / Cholesky</h1>
    
    <div class="controls">
        <label>Dimensión (2-6):</label>
        <input type="number" id="size" value="3" min="2" max="6" onchange="generateMatrix()">
        <label>Método:</label>
        <select id="method">
            <option value="doolittle">Doolittle (Lii = 1)</option>
            <option value="crout">Crout (Uii = 1)</option>
            <option value="cholesky">Cholesky (U = Lᵀ)</option>
        </select>
        <button onclick="solve()">Calcular Factorización</button>
    </div>

    <div id="matrix-input"></div>
    <div id="error-msg" class="error"></div>

    <div class="results" id="results" style="display:none;">
        <div class="matrix-display">
            <h3>Matriz L (Inferior)</h3>
            <div id="matrix-l"></div>
        </div>
        <div class="matrix-display">
            <h3>Matriz U (Superior)</h3>
            <div id="matrix-u"></div>
        </div>
    </div>
</div>

<script>
    function generateMatrix() {
        const n = parseInt(document.getElementById('size').value);
        if (n < 2 || n > 6) return;
        const container = document.getElementById('matrix-input');
        container.style.gridTemplateColumns = `repeat(${n}, 70px)`;
        container.innerHTML = '';
        
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n; j++) {
                const input = document.createElement('input');
                input.type = 'number';
                input.id = `a-${i}-${j}`;
                input.value = (i === j) ? 2 : 1; // Valores por defecto
                input.style.width = '60px';
                container.appendChild(input);
            }
        }
        document.getElementById('results').style.display = 'none';
    }

    function getMatrixData(n) {
        let matrix = Array.from({ length: n }, () => new Array(n).fill(0));
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n; j++) {
                matrix[i][j] = parseFloat(document.getElementById(`a-${i}-${j}`).value) || 0;
            }
        }
        return matrix;
    }

    function displayMatrix(id, matrix) {
        let html = '<table>';
        matrix.forEach(row => {
            html += '<tr>';
            row.forEach(val => {
                html += `<td>${val.toFixed(3)}</td>`;
            });
            html += '</tr>';
        });
        html += '</table>';
        document.getElementById(id).innerHTML = html;
    }

    function solve() {
        const n = parseInt(document.getElementById('size').value);
        const method = document.getElementById('method').value;
        const A = getMatrixData(n);
        const errorMsg = document.getElementById('error-msg');
        errorMsg.innerText = '';
        
        let L = Array.from({ length: n }, () => new Array(n).fill(0));
        let U = Array.from({ length: n }, () => new Array(n).fill(0));

        try {
            if (method === 'doolittle') {
                for (let i = 0; i < n; i++) {
                    for (let k = i; k < n; k++) {
                        let sum = 0;
                        for (let j = 0; j < i; j++) sum += (L[i][j] * U[j][k]);
                        U[i][k] = A[i][k] - sum;
                    }
                    for (let k = i; k < n; k++) {
                        if (i === k) L[i][i] = 1;
                        else {
                            let sum = 0;
                            for (let j = 0; j < i; j++) sum += (L[k][j] * U[j][i]);
                            L[k][i] = (A[k][i] - sum) / U[i][i];
                        }
                    }
                }
            } else if (method === 'crout') {
                for (let j = 0; j < n; j++) {
                    for (let i = j; i < n; i++) {
                        let sum = 0;
                        for (let k = 0; k < j; k++) sum += L[i][k] * U[k][j];
                        L[i][j] = A[i][j] - sum;
                    }
                    for (let i = j; i < n; i++) {
                        if (i === j) U[j][j] = 1;
                        else {
                            let sum = 0;
                            for (let k = 0; k < j; k++) sum += L[j][k] * U[k][i];
                            U[j][i] = (A[j][i] - sum) / L[j][j];
                        }
                    }
                }
            } else if (method === 'cholesky') {
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j <= i; j++) {
                        let sum = 0;
                        for (let k = 0; k < j; k++) sum += L[i][k] * L[j][k];
                        if (i === j) {
                            let val = A[i][i] - sum;
                            if (val < 0) throw new Error("La matriz no es definida positiva.");
                            L[i][j] = Math.sqrt(val);
                        } else {
                            L[i][j] = (A[i][j] - sum) / L[j][j];
                        }
                    }
                }
                // U es la transpuesta de L
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) U[i][j] = L[j][i];
                }
            }

            document.getElementById('results').style.display = 'grid';
            displayMatrix('matrix-l', L);
            displayMatrix('matrix-u', U);
        } catch (e) {
            errorMsg.innerText = e.message;
            document.getElementById('results').style.display = 'none';
        }
    }

    // Inicializar
    generateMatrix();
</script>

</body>
</html>
